[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
monitor_eol = LF

lib_deps =
  adafruit/Adafruit MAX31856 library @ ^1.2.8
  adafruit/Adafruit BusIO
  adafruit/Adafruit Unified Sensor
  adafruit/Adafruit MAX31865 library
  br3ttb/PID @ ^1.2.1
